version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: pm_user
      POSTGRES_PASSWORD: pm_pass
      POSTGRES_DB: performance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm_user -d performance_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres.railway.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: YjCucYQyCRZlrUgNNEAfjalswGzSUDpw
      DB_NAME: railway
      DATABASE_URL: postgresql://postgres:wzppxYvPeuUbNKfKjjkHwEVBXMwKtlgI@postgres.railway.internal:5432/railway
      JWT_SECRET: c6f7b9d8e2a1f3c4d5b6a7c8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f
    ports:
      - "3000:3000"

volumes:
  pgdata:
